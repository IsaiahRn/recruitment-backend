server:
  port: ${PORT:8081}
  shutdown: graceful
  forward-headers-strategy: framework

spring:
  application:
    name: recruitment-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/recruitment}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 2000
      idle-timeout: 30000
      max-lifetime: 600000

  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}
      timeout: 2s

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
        show_sql: false
        default_batch_fetch_size: 50

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  flyway:
    enabled: true
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: recruitment-service
      auto-offset-reset: earliest

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

  storage:
    base-dir: ${APP_STORAGE_BASE_DIR:./uploads}

  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      access-ttl-minutes: ${APP_SECURITY_JWT_ACCESS_TTL_MINUTES:15}
      refresh-ttl-days: ${APP_SECURITY_JWT_REFRESH_TTL_DAYS:7}
    data-encryption-secret: ${APP_SECURITY_DATA_ENCRYPTION_SECRET:development-encryption-secret-change-me}
    data-hash-secret: ${APP_SECURITY_DATA_HASH_SECRET:development-hash-secret-change-me}
    authenticator:
      issuer: ${APP_SECURITY_AUTHENTICATOR_ISSUER:Recruitment Platform}

  kafka:
    enabled: ${APP_KAFKA_ENABLED:false}
    topics:
      application-events: ${APP_KAFKA_TOPIC_APPLICATION_EVENTS:application-events}
